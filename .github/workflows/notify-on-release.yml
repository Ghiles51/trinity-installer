name: Notify clients on release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    # QUI RECOIT QUOI :
    #   tag vX.Y.Z       -> clients Windows (+ ceux dont l'OS est inconnu :
    #                       licences anterieures a la colonne os, donc
    #                       forcement Windows) + lien vers le .exe
    #   tag vX.Y.Z-mac   -> clients Mac uniquement + lien vers le .dmg
    #   tag *-linux      -> personne (aucun canal dedie)
    # Un client Mac ne doit jamais recevoir une annonce pointant un .exe,
    # et inversement : c'est tout l'objet du ciblage (TARGET_OS plus bas).
    #
    # GARDE-FOU PRE-VERSION : une release "prerelease" sert a tester sans
    # deranger personne. Sans cette condition, publier une pre-version
    # envoyait quand meme l'email a tous les clients.
    if: >-
      ${{ !endsWith(github.event.release.tag_name, '-linux')
          && github.event.release.prerelease == false }}
    steps:
      - name: Notify Trinity clients
        env:
          ADMIN_TOKEN: ${{ secrets.TRINITY_ADMIN_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          NOTES: ${{ github.event.release.body }}
        run: |
          # Tag en -mac => release Mac : on cible les clients Mac et on
          # pointe le .dmg. Sinon => release Windows : clients Windows (et
          # ceux dont l'OS est inconnu, anterieurs a la colonne os) + .exe.
          case "$TAG" in
            *-mac) TARGET_OS="mac";     ASSET="Trinity-Setup.dmg" ;;
            *)     TARGET_OS="windows"; ASSET="Trinity-Setup.exe" ;;
          esac
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ASSET}"
          echo "Cible : $TARGET_OS"
          BODY=$(jq -n \
            --arg tag "$TAG" \
            --arg url "$DOWNLOAD_URL" \
            --arg notes "$NOTES" \
            --arg os "$TARGET_OS" \
            '{tag: $tag, download_url: $url, release_notes: $notes, os: $os}')
          echo "Payload: $BODY"
          curl -sS -L -X POST "https://bot.tiktok-master.com/api/admin/notify-update" \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            --fail-with-body
