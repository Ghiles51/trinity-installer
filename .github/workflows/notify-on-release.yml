name: Notify clients on release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    # GARDE-FOU : ne JAMAIS notifier les clients pour une release Mac (-mac) ou
    # Linux (-linux). Ces distributions sont gérées séparément (par OS) et le mail
    # auto pointe vers un .exe Windows qui n'existe pas dans ces releases. Seules
    # les vraies releases Windows (tag vX.Y.Z sans suffixe) déclenchent l'email.
    if: ${{ !endsWith(github.event.release.tag_name, '-mac') && !endsWith(github.event.release.tag_name, '-linux') }}
    steps:
      - name: Notify Trinity clients
        env:
          ADMIN_TOKEN: ${{ secrets.TRINITY_ADMIN_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          NOTES: ${{ github.event.release.body }}
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Trinity-Setup.exe"
          BODY=$(jq -n \
            --arg tag "$TAG" \
            --arg url "$DOWNLOAD_URL" \
            --arg notes "$NOTES" \
            '{tag: $tag, download_url: $url, release_notes: $notes}')
          echo "Payload: $BODY"
          curl -sS -L -X POST "https://bot.tiktok-master.com/api/admin/notify-update" \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            --fail-with-body
