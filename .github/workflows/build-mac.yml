name: Build Trinity macOS (.dmg)

# Fabrique Trinity-Setup.dmg sur un Mac cloud GitHub.
# Hébergé sur trinity-installer (PUBLIC) → runners macOS gratuits et dispos.
# Récupère le code depuis les repos PRIVÉS trinity-saas (agent+packaging) et
# trinity-bot (le bot) via le secret TRINITY_BOT_PAT.
#
# Déclenchement : onglet Actions → "Build Trinity macOS (.dmg)" → Run workflow.
# Le .dmg est dispo en "artifact" + (option) publié en PRÉ-VERSION v{X}-mac
# (jamais en release normale : ça volerait "Latest" au .exe Windows et
# le garde-fou notify-on-release ignore les tags -mac).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Numéro de version (ex: 1.0.24)"
        required: true
        default: "1.0.24"
      publish_release:
        description: "Publier aussi en pré-version dans les Releases ?"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14   # Apple Silicon (arm64). Couvre tous les Mac M1/M2/M3/M4.
    timeout-minutes: 45

    steps:
      - name: Checkout trinity-saas (agent + packaging, privé)
        uses: actions/checkout@v4
        with:
          repository: Ghiles51/trinity-saas
          token: ${{ secrets.TRINITY_BOT_PAT }}
          path: trinity-saas

      - name: Checkout trinity-bot (le bot, privé)
        uses: actions/checkout@v4
        with:
          repository: Ghiles51/trinity-bot
          token: ${{ secrets.TRINITY_BOT_PAT }}
          path: trinity-bot

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install \
            requests \
            "yt-dlp>=2024.10.0" \
            "Pillow>=10.0.0" \
            "imagehash>=4.3.1" \
            "pyyaml>=6.0" \
            "python-dotenv>=1.0.0" \
            "flask>=3.0.0" \
            "cryptography>=42.0.0" \
            "elevenlabs>=1.10.0"

      - name: Télécharger ffmpeg + ffprobe (macOS Apple Silicon, statique)
        run: |
          set -e
          FFDIR="trinity-saas/packaging/ffmpeg-mac"
          mkdir -p "$FFDIR"
          BASE="https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release"
          echo "Téléchargement ffmpeg arm64 (martin-riedl.de, build statique)…"
          if curl -L --retry 3 -f -o ffmpeg.zip  "$BASE/ffmpeg.zip" \
             && curl -L --retry 3 -f -o ffprobe.zip "$BASE/ffprobe.zip"; then
            unzip -o ffmpeg.zip  -d "$FFDIR"
            unzip -o ffprobe.zip -d "$FFDIR"
          else
            echo "Source statique indispo → fallback Homebrew"
            brew install ffmpeg
            cp "$(brew --prefix)/bin/ffmpeg"  "$FFDIR/ffmpeg"
            cp "$(brew --prefix)/bin/ffprobe" "$FFDIR/ffprobe"
          fi
          chmod +x "$FFDIR/ffmpeg" "$FFDIR/ffprobe"
          echo "--- ffmpeg présent : ---"
          ls -la "$FFDIR"
          file "$FFDIR/ffmpeg"
          "$FFDIR/ffmpeg" -version | head -1

      - name: Générer l'icône .icns (depuis trinity-icon-1024.png)
        working-directory: trinity-saas/packaging
        run: |
          set -e
          SRC="mac/trinity-icon-1024.png"
          ICONSET="trinity.iconset"
          rm -rf "$ICONSET" && mkdir -p "$ICONSET"
          for s in 16 32 64 128 256 512; do
            sips -z $s $s "$SRC" --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
            d=$((s*2))
            sips -z $d $d "$SRC" --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o mac/trinity.icns
          ls -la mac/trinity.icns

      - name: Build PyInstaller (onedir)
        working-directory: trinity-saas/packaging
        env:
          TRINITY_BOT_ROOT: ${{ github.workspace }}/trinity-bot
        run: |
          set -e
          echo "BOT_ROOT = $TRINITY_BOT_ROOT"
          ls -la "$TRINITY_BOT_ROOT" | head
          pyinstaller Trinity-Agent-mac.spec --clean --noconfirm
          echo "--- dist/ ---"
          ls -la dist/Trinity-Agent | head

      - name: Emballer en Trinity Agent.app
        working-directory: trinity-saas/packaging
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -e
          APP="dist/Trinity Agent.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp -R "dist/Trinity-Agent" "$APP/Contents/Resources/Trinity-Agent"
          cp "mac/trinity-launch" "$APP/Contents/MacOS/trinity-launch"
          chmod +x "$APP/Contents/MacOS/trinity-launch"
          cp "mac/trinity.icns" "$APP/Contents/Resources/trinity.icns"
          sed "s/__VERSION__/${VERSION}/g" "mac/Info.plist" > "$APP/Contents/Info.plist"
          # Signature ad-hoc : indispensable sur Apple Silicon (binaire non signé
          # = tué au lancement) et rend Gatekeeper moins agressif.
          codesign --force --deep -s - "$APP"
          echo "--- App créée : ---"
          ls -la "$APP/Contents"
          codesign -dv "$APP" 2>&1 | head -3

      - name: Créer le .dmg habillé (create-dmg, fallback hdiutil)
        working-directory: trinity-saas/packaging
        run: |
          set -e
          mkdir -p installer
          STAGE="dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R "dist/Trinity Agent.app" "$STAGE/"
          cp "mac/INSTALL-MAC.txt" "$STAGE/LISEZ-MOI.txt"
          brew install create-dmg || true
          if command -v create-dmg >/dev/null; then
            # DMG habillé : fond guide + icônes positionnées + icône volume.
            create-dmg \
              --volname "Trinity Agent" \
              --volicon "mac/trinity.icns" \
              --background "mac/dmg-background.png" \
              --window-pos 200 120 \
              --window-size 660 400 \
              --icon-size 110 \
              --icon "Trinity Agent.app" 170 205 \
              --app-drop-link 490 205 \
              --icon "LISEZ-MOI.txt" 545 322 \
              --hide-extension "LISEZ-MOI.txt" \
              --no-internet-enable \
              "installer/Trinity-Setup.dmg" \
              "$STAGE/" \
            || CREATE_DMG_FAILED=1
          else
            CREATE_DMG_FAILED=1
          fi
          if [ "${CREATE_DMG_FAILED:-0}" = "1" ]; then
            echo "create-dmg indisponible → fallback hdiutil (DMG simple)"
            ln -s /Applications "$STAGE/Applications"
            hdiutil create -volname "Trinity Agent" \
              -srcfolder "$STAGE" \
              -ov -format UDZO \
              "installer/Trinity-Setup.dmg"
          fi
          echo "--- DMG créé : ---"
          ls -lah installer/Trinity-Setup.dmg

      - name: Upload artifact (.dmg téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: Trinity-Setup-dmg
          path: trinity-saas/packaging/installer/Trinity-Setup.dmg
          retention-days: 14

      - name: (Optionnel) Publier en PRÉ-VERSION
        if: ${{ github.event.inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -e
          cd trinity-saas/packaging/installer
          TAG="v${VERSION}-mac"
          # --prerelease OBLIGATOIRE : ne vole pas "Latest" au .exe Windows
          # et le garde-fou notify-on-release skip les tags -mac (zéro email).
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Trinity Mac ${VERSION}" \
            --prerelease \
            --notes "Version macOS Apple Silicon. Installation en 1 commande : https://bot.tiktok-master.com/mac" \
            Trinity-Setup.dmg \
          || gh release upload "$TAG" --repo ${{ github.repository }} Trinity-Setup.dmg --clobber
