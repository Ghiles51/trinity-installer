name: Build Trinity macOS (.dmg)

# Fabrique Trinity-Setup.dmg sur un Mac cloud GitHub.
# Hébergé sur trinity-installer (PUBLIC) → runners macOS gratuits et dispos.
# Récupère le code depuis les repos PRIVÉS trinity-saas (agent+packaging) et
# trinity-bot (le bot) via le secret TRINITY_BOT_PAT.
#
# Déclenchement : onglet Actions → "Build Trinity macOS (.dmg)" → Run workflow.
# Le .dmg est dispo en "artifact" + (option) publié en PRÉ-VERSION v{X}-mac
# (jamais en release normale : ça volerait "Latest" au .exe Windows et
# le garde-fou notify-on-release ignore les tags -mac).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Numéro de version (ex: 1.0.24)"
        required: true
        default: "1.0.24"
      publish_release:
        description: "Publier aussi en pré-version dans les Releases ?"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14   # Apple Silicon (arm64). Couvre tous les Mac M1/M2/M3/M4.
    timeout-minutes: 45

    steps:
      - name: Checkout trinity-saas (agent + packaging, privé)
        uses: actions/checkout@v4
        with:
          repository: Ghiles51/trinity-saas
          token: ${{ secrets.TRINITY_BOT_PAT }}
          path: trinity-saas

      - name: Checkout trinity-bot (le bot, privé)
        uses: actions/checkout@v4
        with:
          repository: Ghiles51/trinity-bot
          token: ${{ secrets.TRINITY_BOT_PAT }}
          path: trinity-bot

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install \
            requests \
            "yt-dlp>=2024.10.0" \
            "Pillow>=10.0.0" \
            "imagehash>=4.3.1" \
            "pyyaml>=6.0" \
            "python-dotenv>=1.0.0" \
            "flask>=3.0.0" \
            "cryptography>=42.0.0" \
            "elevenlabs>=1.10.0"

      - name: Télécharger ffmpeg + ffprobe (macOS Apple Silicon, statique)
        run: |
          set -e
          FFDIR="trinity-saas/packaging/ffmpeg-mac"
          mkdir -p "$FFDIR"
          BASE="https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release"
          echo "Téléchargement ffmpeg arm64 (martin-riedl.de, build statique)…"
          if curl -L --retry 3 -f -o ffmpeg.zip  "$BASE/ffmpeg.zip" \
             && curl -L --retry 3 -f -o ffprobe.zip "$BASE/ffprobe.zip"; then
            unzip -o ffmpeg.zip  -d "$FFDIR"
            unzip -o ffprobe.zip -d "$FFDIR"
          else
            echo "Source statique indispo → fallback Homebrew"
            brew install ffmpeg
            cp "$(brew --prefix)/bin/ffmpeg"  "$FFDIR/ffmpeg"
            cp "$(brew --prefix)/bin/ffprobe" "$FFDIR/ffprobe"
          fi
          chmod +x "$FFDIR/ffmpeg" "$FFDIR/ffprobe"
          echo "--- ffmpeg présent : ---"
          ls -la "$FFDIR"
          file "$FFDIR/ffmpeg"
          "$FFDIR/ffmpeg" -version | head -1

      - name: Générer l'icône .icns (depuis trinity-icon-1024.png)
        working-directory: trinity-saas/packaging
        run: |
          set -e
          SRC="mac/trinity-icon-1024.png"
          ICONSET="trinity.iconset"
          rm -rf "$ICONSET" && mkdir -p "$ICONSET"
          for s in 16 32 64 128 256 512; do
            sips -z $s $s "$SRC" --out "$ICONSET/icon_${s}x${s}.png" >/dev/null
            d=$((s*2))
            sips -z $d $d "$SRC" --out "$ICONSET/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns "$ICONSET" -o mac/trinity.icns
          ls -la mac/trinity.icns

      # ── Signature Apple ────────────────────────────────────────────────
      # Importe le certificat "Developer ID Application" dans un trousseau
      # temporaire, propre au runner (détruit avec la machine).
      # Si les secrets ne sont pas posés, on continue SANS signature Apple :
      # le build retombe sur la signature ad-hoc d'avant (rien ne casse).
      - name: Importer le certificat Developer ID
        id: cert
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -e
          if [ -z "$CERT_P12_BASE64" ]; then
            echo "Aucun certificat configuré → signature ad-hoc (non notarisable)."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/trinity-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Autorise codesign à utiliser la clé sans prompt graphique.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"
          # On récupère l'EMPREINTE (hash) plutôt que le nom : le nom contient
          # un accent ("Ghilès") qui casse selon l'encodage du shell.
          HASH="$(security find-identity -v -p codesigning "$KEYCHAIN" \
                  | grep 'Developer ID Application' | head -1 | awk '{print $2}')"
          if [ -z "$HASH" ]; then
            echo "::error::Certificat importé mais aucune identité 'Developer ID Application' trouvée."
            exit 1
          fi
          echo "Identité de signature trouvée : $HASH"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "keychain=$KEYCHAIN" >> "$GITHUB_OUTPUT"

      - name: Build PyInstaller (onedir)
        working-directory: trinity-saas/packaging
        env:
          TRINITY_BOT_ROOT: ${{ github.workspace }}/trinity-bot
        run: |
          set -e
          echo "BOT_ROOT = $TRINITY_BOT_ROOT"
          ls -la "$TRINITY_BOT_ROOT" | head
          pyinstaller Trinity-Agent-mac.spec --clean --noconfirm
          echo "--- dist/ ---"
          ls -la dist/Trinity-Agent | head

      - name: Emballer en Trinity Agent.app
        working-directory: trinity-saas/packaging
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -e
          APP="dist/Trinity Agent.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp -R "dist/Trinity-Agent" "$APP/Contents/Resources/Trinity-Agent"
          cp "mac/trinity-launch" "$APP/Contents/MacOS/trinity-launch"
          chmod +x "$APP/Contents/MacOS/trinity-launch"
          cp "mac/trinity.icns" "$APP/Contents/Resources/trinity.icns"
          sed "s/__VERSION__/${VERSION}/g" "mac/Info.plist" > "$APP/Contents/Info.plist"
          echo "--- App créée : ---"
          ls -la "$APP/Contents"

      - name: Signer l'app (Developer ID + hardened runtime)
        working-directory: trinity-saas/packaging
        env:
          SIGNED: ${{ steps.cert.outputs.signed }}
          HASH: ${{ steps.cert.outputs.hash }}
        run: |
          set -e
          APP="dist/Trinity Agent.app"

          if [ "$SIGNED" != "true" ]; then
            # Repli historique : signature ad-hoc. Indispensable sur Apple
            # Silicon (un binaire non signé est tué au lancement) mais NON
            # notarisable → Gatekeeper affichera un avertissement.
            echo "Pas de certificat → signature ad-hoc."
            codesign --force --deep -s - "$APP"
            codesign -dv "$APP" 2>&1 | head -3
            exit 0
          fi

          # Le hardened runtime est OBLIGATOIRE pour la notarisation, mais il
          # interdit par défaut ce dont Python/PyInstaller a besoin (mémoire
          # exécutable, chargement de .dylib non signées par nous). Ces
          # exceptions rouvrent juste ce qu'il faut, rien de plus.
          cat > "$RUNNER_TEMP/entitlements.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key><true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>
            <key>com.apple.security.cs.allow-dyld-environment-variables</key><true/>
            <key>com.apple.security.cs.disable-library-validation</key><true/>
          </dict>
          </plist>
          PLIST

          # --deep est déprécié et signe mal les bundles imbriqués : on signe
          # chaque binaire de l'intérieur vers l'extérieur, puis le bundle.
          echo "→ Signature des binaires internes…"
          find "$APP" -type f \( -name "*.dylib" -o -name "*.so" -o -perm -u+x \) -print0 \
          | while IFS= read -r -d '' f; do
              if file "$f" | grep -q "Mach-O"; then
                codesign --force --timestamp --options runtime \
                  --entitlements "$RUNNER_TEMP/entitlements.plist" \
                  -s "$HASH" "$f" >/dev/null 2>&1 || echo "  (ignoré : $f)"
              fi
            done

          echo "→ Signature du bundle…"
          codesign --force --timestamp --options runtime \
            --entitlements "$RUNNER_TEMP/entitlements.plist" \
            -s "$HASH" "$APP"

          echo "--- Vérification ---"
          codesign -dvvv "$APP" 2>&1 | grep -E "Authority|TeamIdentifier|Timestamp|flags" | head -6
          codesign --verify --strict --verbose=2 "$APP"

      - name: Notariser l'app chez Apple
        if: ${{ steps.cert.outputs.signed == 'true' }}
        working-directory: trinity-saas/packaging
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          APP="dist/Trinity Agent.app"
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "::error::Signature OK mais identifiants de notarisation manquants (APPLE_ID / APPLE_APP_PASSWORD / APPLE_TEAM_ID)."
            exit 1
          fi
          # On envoie l'app zippée à Apple, qui la scanne (quelques minutes),
          # puis on "agrafe" (staple) le ticket DANS l'app : elle s'ouvre
          # ensuite sans avertissement, même hors connexion.
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/Trinity-Agent.zip"
          xcrun notarytool submit "$RUNNER_TEMP/Trinity-Agent.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Créer le .dmg habillé (create-dmg, fallback hdiutil)
        working-directory: trinity-saas/packaging
        run: |
          set -e
          mkdir -p installer
          STAGE="dmg-stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"
          cp -R "dist/Trinity Agent.app" "$STAGE/"
          cp "mac/INSTALL-MAC.txt" "$STAGE/LISEZ-MOI.txt"
          brew install create-dmg || true
          if command -v create-dmg >/dev/null; then
            # DMG habillé : fond guide + icônes positionnées + icône volume.
            create-dmg \
              --volname "Trinity Agent" \
              --volicon "mac/trinity.icns" \
              --background "mac/dmg-background.png" \
              --window-pos 200 120 \
              --window-size 660 400 \
              --icon-size 110 \
              --icon "Trinity Agent.app" 170 205 \
              --app-drop-link 490 205 \
              --icon "LISEZ-MOI.txt" 545 322 \
              --hide-extension "LISEZ-MOI.txt" \
              --no-internet-enable \
              "installer/Trinity-Setup.dmg" \
              "$STAGE/" \
            || CREATE_DMG_FAILED=1
          else
            CREATE_DMG_FAILED=1
          fi
          if [ "${CREATE_DMG_FAILED:-0}" = "1" ]; then
            echo "create-dmg indisponible → fallback hdiutil (DMG simple)"
            ln -s /Applications "$STAGE/Applications"
            hdiutil create -volname "Trinity Agent" \
              -srcfolder "$STAGE" \
              -ov -format UDZO \
              "installer/Trinity-Setup.dmg"
          fi
          echo "--- DMG créé : ---"
          ls -lah installer/Trinity-Setup.dmg

      - name: Signer + notariser le .dmg
        if: ${{ steps.cert.outputs.signed == 'true' }}
        working-directory: trinity-saas/packaging
        env:
          HASH: ${{ steps.cert.outputs.hash }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          DMG="installer/Trinity-Setup.dmg"
          # Le .dmg est notarisé À SON TOUR : sans ça, un client qui ouvre le
          # .dmg téléchargé depuis le navigateur verrait encore un
          # avertissement, même si l'app à l'intérieur est propre.
          codesign --force --timestamp -s "$HASH" "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          echo "--- Verdict Gatekeeper ---"
          spctl -a -t open --context context:primary-signature -vv "$DMG" || true

      - name: Upload artifact (.dmg téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: Trinity-Setup-dmg
          path: trinity-saas/packaging/installer/Trinity-Setup.dmg
          retention-days: 14

      - name: (Optionnel) Publier en PRÉ-VERSION
        if: ${{ github.event.inputs.publish_release == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -e
          cd trinity-saas/packaging/installer
          TAG="v${VERSION}-mac"
          # --prerelease OBLIGATOIRE : ne vole pas "Latest" au .exe Windows
          # et le garde-fou notify-on-release skip les tags -mac (zéro email).
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Trinity Mac ${VERSION}" \
            --prerelease \
            --notes "Version macOS Apple Silicon. Installation en 1 commande : https://bot.tiktok-master.com/mac" \
            Trinity-Setup.dmg \
          || gh release upload "$TAG" --repo ${{ github.repository }} Trinity-Setup.dmg --clobber
